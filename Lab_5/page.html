<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Task 3 — Каталог користувачів</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 720px; margin: 2rem auto; padding: 1rem; line-height: 1.5; }
    h1 { color: #2050a0; }
    #users { display: grid; gap: 1rem; }
    .card { 
      background: #f6f8fa;
      border: 1px solid #e1e4e8; 
      border-radius: 6px; 
      padding: 1rem; }
    .card h3 { 
      margin: 0 0 0.3rem; 
      color: #2050a0; }
    .card .meta { 
      color: #555; 
      font-size: 0.95em; 
      margin: 0.2rem 0; }
    .card button { 
      margin-top: 0.5rem; 
      padding: 6px 12px; 
      background: #2050a0; 
      color: white; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      font-size: 0.9rem; }
    .card button:disabled { opacity: 0.6; }
    .posts { 
      margin-top: 0.8rem; 
      padding-top: 0.8rem; 
      border-top: 1px dashed #ddd; }
    .posts h4 { 
      font-size: 0.95rem; 
      margin: 0 0 0.5rem; }
    .posts ul { 
      margin: 0; 
      padding-left: 1.2rem; 
      font-size: 0.9rem; 
      color: #555; }
    .error { 
      color: #c33; 
      font-size: 0.9em; }
    #status { color: #888; }
  </style>
</head>
<body>

  <h1>Каталог користувачів</h1>
  <p id="status">Завантаження...</p>
  <div id="users"></div>

  <script src="users.js"></script>
</body>
</html>
